<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mystic Stage</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    background:linear-gradient(135deg,#0f172a,#1e293b);
    color:white;
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    padding:20px;
}

.container{
    width:100%;
    max-width:500px;
    background:rgba(255,255,255,.08);
    backdrop-filter:blur(10px);
    border-radius:20px;
    padding:35px;
}

h1{
    text-align:center;
    margin-bottom:10px;
}

.subtitle{
    text-align:center;
    color:#cbd5e1;
    margin-bottom:25px;
}

input{
    width:100%;
    padding:14px;
    margin-bottom:15px;
    border:none;
    border-radius:10px;
}

.checkbox{
    display:flex;
    align-items:flex-start;
    gap:10px;
    margin-bottom:20px;
    font-size:14px;
}

.checkbox input{
    width:auto;
    margin-top:4px;
}

button{
    width:100%;
    padding:14px;
    border:none;
    border-radius:10px;
    background:#7c3aed;
    color:white;
    font-size:16px;
    cursor:pointer;
}

button:hover{
    background:#6d28d9;
}

.rodo{
    margin-top:20px;
    font-size:12px;
    color:#cbd5e1;
    line-height:1.5;
}
</style>
</head>
<body>

<div class="container">
    <h1>Mystic Stage</h1>
    <p class="subtitle">Wypełnij formularz kontaktowy</p>

    <form action="https://formsubmit.co/keczupfrytka39@gmail.com" method="POST">

        <input type="hidden" name="_subject" value="Nowe zgłoszenie Mystic Stage">
        <input type="hidden" name="_captcha" value="false">

        <input
            type="text"
            name="imie_i_nazwisko"
            placeholder="Imię i nazwisko"
            required>

        <input
            type="tel"
            name="telefon"
            placeholder="Numer telefonu"
            required>

        <div class="checkbox">
            <input
                type="checkbox"
                name="zgoda_rodo"
                value="tak"
                required>
            <label>
                Wyrażam zgodę na przetwarzanie moich danych osobowych
                w celu kontaktu zwrotnego i obsługi zgłoszenia.
            </label>
        </div>

        <button type="submit">Wyślij zgłoszenie</button>

    </form>

    <div class="rodo">
        Administrator danych przetwarza podane dane wyłącznie
        w celu kontaktu i obsługi zgłoszenia. Osobie, której dane
        dotyczą, przysługuje prawo dostępu do danych, ich poprawiania,
        usunięcia oraz ograniczenia przetwarzania zgodnie z RODO.
    </div>
</div>

</body>
</html>
